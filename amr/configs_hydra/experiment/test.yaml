# @package _global_

GENERAL:

# based on batch = 16
# Animal3D : 191
# Control_Animal3D : 517
# All other 2D : 1874

  TOTAL_STEPS: 1_534_160  
  LOG_STEPS: 2583 
  VAL_STEPS: 2583 
  VAL_EPOCHS: 20
  CHECKPOINT_EPOCHS: 1
  CHECKPOINT_SAVE_TOP_K: 1
  NUM_WORKERS: 64
  PREFETCH_FACTOR: 2

LOSS_WEIGHTS:
  KEYPOINTS_3D: 0.05
  KEYPOINTS_2D: 0.01
  GLOBAL_ORIENT: 0.001  # 0.001
  POSE: 0.001  # 0.001
  BETAS: 0.0005  # 0.0005
  TRANSL: 0.0005
  ADVERSARIAL: 0
  SUPCON: 0.0005
  CE: 0.0005

TRAIN:
  LR: 1.25e-6
  WEIGHT_DECAY: 1e-4
  BATCH_SIZE: 16
  LOSS_REDUCTION: mean
  NUM_TRAIN_SAMPLES: 2
  NUM_TEST_SAMPLES: 64
  POSE_2D_NOISE_RATIO: 0.01
  SMPL_PARAM_NOISE_RATIO: 0.005

MODEL:
  USE_CLS: true
  IMAGE_SIZE: 256
  IMAGE_MEAN: [0.485, 0.456, 0.406]
  IMAGE_STD: [0.229, 0.224, 0.225]
  BACKBONE:
    TYPE: vit  # dinov2
    PRETRAINED_WEIGHTS: ./data/backbone.pth
  SMAL_HEAD:
    TYPE: transformer_decoder
    IN_CHANNELS: 2048
    IEF_ITERS: 1
    TRANSFORMER_DECODER:
      depth: 6
      heads: 8
      mlp_dim: 1024
      dim_head: 64
      dropout: 0.0
      emb_dropout: 0.0
      norm: layer
      context_dim: 1280 # dinov2b:768

SMAL:
  DATA_DIR: _DATA/data/
  MODEL_PATH: ./smal_v1/my_smpl_00781_4_all.pkl
  SHAPE_PRIOR_PATH: ./smal_v1/my_smpl_data_00781_4_all.pkl
  POSE_PRIOR_PATH: ./smal_v1/walking_toy_symmetric_pose_prior_with_cov_35parts.pkl
  GENDER: neutral
  NUM_JOINTS: 34
  CREATE_BODY_POSE: FALSE

EXTRA:
  FOCAL_LENGTH: 1000
  NUM_LOG_IMAGES: 4
  NUM_LOG_SAMPLES_PER_IMAGE: 4
  PELVIS_IND: 0

DATASETS:
  ANIMAL3D:
    ROOT_IMAGE: /data/lvjin/data/animal3d/  # /data/lvjin/data/animal3d/
    JSON_FILE:
      TRAIN: /data/lvjin/data/animal3d/train.json  # /data/lvjin/data/animal3d/train.json
      TEST: /data/lvjin/data/animal3d/test.json  # /data/lvjin/data/animal3d/test.json
  ANIMALPOSE:
    ROOT_IMAGE: /data/lvjin/data/dog_test/animal_pose/
    JSON_FILE: 
      TEST: /data/lvjin/data/dog_test/animal_pose/test.json
  # HORSE10:
  #   ROOT_IMAGE: /data/lvjin/data/horse10/
  #   JSON_FILE: /data/lvjin/data/horse10/labeled-data/data.json
  # APT36K:
  #   ROOT_IMAGE: /data/lvjin/data/APT-36k/AP-36k-patr1/
  #   JSON_FILE: /data/lvjin/data/APT-36k/data.json
  # AWAPOSE:
  #   ROOT_IMAGE: /data/lvjin/data/AwA2-data/Animals_with_Attributes2/JPEGImages/
  #   JSON_FILE: /data/lvjin/data/AwA2-data/data.json
  # ZEBRA:
  #   ROOT_IMAGE: /data/lvjin/data/zebra_training_set/images/
  #   ROOT_PKL: /data/lvjin/data/zebra_training_set/annotations/
  CONTROL_ANIMAL3D:
    ROOT_IMAGE: /data/lvjin/data/control_animal3dlatest/
    JSON_FILE: 
      TRAIN: /data/lvjin/data/control_animal3dlatest/train.json
      TEST: /data/lvjin/data/control_animal3dlatest/test.json
  ANIMAL_KINGDOM:
    ROOT_IMAGE: /data/lvjin/data/Animal_Kingdom_test/
    JSON_FILE:
      TEST: /data/lvjin/data/Animal_Kingdom_test/test.json
  STANFORDEXTRA:
    ROOT_IMAGE: /data/lvjin/data/dog_test/StanfordExtra/
    JSON_FILE: 
      TEST: /data/lvjin/data/dog_test/StanfordExtra/test.json
  CONFIG:
    SCALE_FACTOR: 0.0
    ROT_FACTOR: 0
    TRANS_FACTOR: 0.0
    COLOR_SCALE: 0.0
    ROT_AUG_RATE: 0.0
    TRANS_AUG_RATE: 0.0
    DO_FLIP: False
    FLIP_AUG_RATE: 0.0
    EXTREME_CROP_AUG_RATE: 0.0
    EXTREME_CROP_AUG_LEVEL: 1

CHECKPOINT: logs/train/runs/withdiscri_stage2/checkpoints/last.ckpt

METRIC:
  PCK_THRESHOLD: [0.05, 0.10, 0.15]
  F_ALIGN_SCORE_THRESHOLD: [0.005, 0.015]